<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理员后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
body{background:#f5f5f5;padding:20px;}
.box{max-width:1200px;margin:0 auto;background:#fff;padding:30px;border-radius:10px;}
.login{max-width:400px;margin:100px auto;text-align:center;}
input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:5px;}
button{padding:10px 20px;border:none;border-radius:5px;cursor:pointer;margin:5px;}
.btn-black{background:#000;color:#fff;}
.btn-red{background:#e53935;color:#fff;}
.btn-blue{background:#1976d2;color:#fff;}
.tab{display:inline-block;padding:8px 15px;background:#eee;margin:5px;cursor:pointer;border-radius:5px;}
.tab.active{background:#000;color:#fff;}
table{width:100%;border-collapse:collapse;margin:20px 0;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;}
.hide{display:none;}
img.pre{width:80px;height:80px;object-fit:cover;}
</style>
</head>
<body>
<div class="box">
  <div id="loginPage">
    <div class="login">
      <h2>管理员登录</h2>
      <input type="password" id="pwd" placeholder="输入密码">
      <button class="btn-black" onclick="login()">登录</button>
    </div>
  </div>

  <div id="adminPage" class="hide">
    <div style="display:flex;justify-content:space-between;">
      <h2>商品管理后台</h2>
      <button class="btn-red" onclick="logout()">退出</button>
    </div>
    <div class="tab-list">
      <div class="tab active" onclick="switchTab('goods')">商品列表</div>
      <div class="tab" onclick="switchTab('add')">添加/编辑商品</div>
      <div class="tab" onclick="switchTab('cate')">分类管理</div>
    </div>

    <div id="goodsTab">
      <table>
        <tr>
          <th>图片</th>
          <th>编号</th>
          <th>名称</th>
          <th>分类</th>
          <th>价格</th>
          <th>库存</th>
          <th>操作</th>
        </tr>
        <tbody id="goodsList"></tbody>
      </table>
    </div>

    <div id="addTab" class="hide">
      <input type="hidden" id="editId">
      <input type="text" id="code" placeholder="商品编号">
      <input type="text" id="name" placeholder="商品名称">
      <select id="cate"></select>
      <input type="number" step="0.01" id="price" placeholder="价格 RM">
      <input type="number" id="stock" placeholder="库存">
      <input type="file" id="imgFile" accept="image/*" onchange="preImg(event)">
      <div><img id="imgPre" class="pre" style="display:none;"></div>
      <button class="btn-black" onclick="saveGoods()">保存</button>
    </div>

    <div id="cateTab" class="hide">
      <input type="text" id="cateName" placeholder="分类名称">
      <button class="btn-black" onclick="addCate()">新增分类</button>
      <table>
        <tr><th>分类</th><th>操作</th></tr>
        <tbody id="cateList"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:3000/api";
const PWD = "Liew1201";
let cateArr = [];
let nowImg = "";

// 登录
function login(){
  if(document.getElementById("pwd").value === PWD){
    document.getElementById("loginPage").classList.add("hide");
    document.getElementById("adminPage").classList.remove("hide");
    loadData();
  }else alert("密码错误");
}
function logout(){
  location.reload();
}
function switchTab(t){
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("goodsTab").classList.add("hide");
  document.getElementById("addTab").classList.add("hide");
  document.getElementById("cateTab").classList.add("hide");
  document.getElementById(t+"Tab").classList.remove("hide");
}

// 加载全部数据
async function loadData(){
  let resCate = await fetch(API+"/category");
  cateArr = await resCate.json();
  renderCateSelect();
  renderCateList();

  let resGoods = await fetch(API+"/goods");
  let goods = await resGoods.json();
  renderGoods(goods);
}

// 渲染商品
function renderGoods(list){
  let html = "";
  list.forEach(item=>{
    html += `
    <tr>
      <td><img src="${item.img}" class="pre"></td>
      <td>${item.code}</td>
      <td>${item.name}</td>
      <td>${item.cateName}</td>
      <td>RM ${item.price}</td>
      <td>${item.stock}</td>
      <td>
        <button class="btn-blue" onclick="editGoods('${item.id}')">编辑</button>
        <button class="btn-red" onclick="delGoods('${item.id}')">删除</button>
      </td>
    </tr>
    `
  })
  document.getElementById("goodsList").innerHTML = html;
}

// 分类下拉
function renderCateSelect(){
  let h = "";
  cateArr.forEach(x=>h+=`<option value="${x.id}">${x.name}</option>`);
  document.getElementById("cate").innerHTML = h;
}
// 分类列表
function renderCateList(){
  let h = "";
  cateArr.forEach(x=>{
    h += `<tr><td>${x.name}</td><td><button class="btn-red" onclick="delCate('${x.id}')">删除</button></tr>`
  })
  document.getElementById("cateList").innerHTML = h;
}

// 图片预览
function preImg(e){
  let f = e.target.files[0];
  let r = new FileReader();
  r.onload = ev=>{
    nowImg = ev.target.result;
    document.getElementById("imgPre").src = nowImg;
    document.getElementById("imgPre").style.display = "block";
  }
  r.readAsDataURL(f);
}

// 保存商品
async function saveGoods(){
  let fd = new FormData();
  fd.append("id",document.getElementById("editId").value);
  fd.append("code",document.getElementById("code").value);
  fd.append("name",document.getElementById("name").value);
  fd.append("cateId",document.getElementById("cate").value);
  fd.append("cateName",document.getElementById("cate").options[document.getElementById("cate").selectedIndex].text);
  fd.append("price",document.getElementById("price").value);
  fd.append("stock",document.getElementById("stock").value);
  if(document.getElementById("imgFile").files[0]){
    fd.append("img",document.getElementById("imgFile").files[0]);
  }

  await fetch(API+"/goods/save",{method:"POST",body:fd});
  alert("保存成功");
  resetForm();
  loadData();
}

// 编辑
async function editGoods(id){
  let res = await fetch(API+"/goods");
  let list = await res.json();
  let item = list.find(x=>x.id===id);
  document.getElementById("editId").value = item.id;
  document.getElementById("code").value = item.code;
  document.getElementById("name").value = item.name;
  document.getElementById("cate").value = item.cateId;
  document.getElementById("price").value = item.price;
  document.getElementById("stock").value = item.stock;
  document.getElementById("imgPre").src = item.img;
  document.getElementById("imgPre").style.display = "block";
  switchTab("add");
}

// 删除商品
async function delGoods(id){
  if(!confirm("确定删除？"))return;
  await fetch(API+"/goods/del",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
  })
  loadData();
}

// 新增分类
async function addCate(){
  let name = document.getElementById("cateName").value;
  await fetch(API+"/category/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name})
  })
  document.getElementById("cateName").value = "";
  loadData();
}
// 删除分类
async function delCate(id){
  if(!confirm("确定？"))return;
  await fetch(API+"/category/del",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
  })
  loadData();
}

function resetForm(){
  document.getElementById("editId").value = "";
  document.getElementById("code").value = "";
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("imgFile").value = "";
  document.getElementById("imgPre").style.display = "none";
  nowImg = "";
}
</script>
</body>
</html>
